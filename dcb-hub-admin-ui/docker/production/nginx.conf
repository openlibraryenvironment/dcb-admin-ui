server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Runtime config rendered by docker-entrypoint.sh from container env vars
	# on every container start - never cache it.
	location = /inject_env.json {
		add_header Cache-Control "no-store";
	}

	# SPA history-API fallback: unknown paths resolve to index.html so
	# TanStack Router's client-side routing can take over.
	location / {
		try_files $uri $uri/ /index.html;
	}
}
